<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>確認テスト - 受験画面</title>
  <link rel="stylesheet" href="/assets/css/styles.css">
</head>
<body>
  <header class="site-header">
    <div class="inner">
      <h1>🛩 二等無人航空機操縦者 確認テスト</h1>
      <nav>
        <a href="/">トップ</a>
        <a href="/dashboard.html">ダッシュボード</a>
      </nav>
    </div>
  </header>

  <main class="container">
    <!-- 受験画面 -->
    <section id="quiz-view" class="card hidden">
      <div class="quiz-progress">
        <div><span id="p-chapter"></span> ／ 受講者：<strong id="p-name"></strong></div>
        <div>問 <span id="p-current">1</span> / <span id="p-total">--</span></div>
      </div>
      <div class="progress-bar"><span id="p-bar" style="width:0%"></span></div>

      <div>
        <span class="section-badge" id="q-section">2.1</span>
        <span class="muted" id="q-subsection"></span>
      </div>
      <p class="question-text" id="q-text">問題文</p>

      <form id="q-form"></form>

      <div class="quiz-actions">
        <button class="btn btn-outline" id="btn-prev" type="button">← 前の問題</button>
        <button class="btn" id="btn-next" type="button">次の問題 →</button>
      </div>
    </section>

    <!-- ローディング -->
    <section id="loading-view" class="card">
      <p class="muted">問題データを読み込み中…</p>
    </section>

    <!-- 結果画面 -->
    <section id="result-view" class="card hidden">
      <h2>テスト結果</h2>
      <div class="score-hero">
        <div class="score-circle" id="score-circle" style="--pct:0%">
          <div class="score-big" id="score-pct">--%</div>
          <div class="score-small" id="score-raw">0 / --</div>
        </div>
        <div>
          <p class="muted">受講者：<strong id="r-name"></strong> / <span id="r-chapter"></span></p>
          <p class="muted">所要時間：<span id="r-duration"></span></p>
          <p id="r-sent" class="muted">送信ステータス：<em>送信中...</em></p>
        </div>
      </div>

      <h3>分野別正答率</h3>
      <table>
        <thead><tr><th>節</th><th>名称</th><th>正答率</th></tr></thead>
        <tbody id="sec-table"></tbody>
      </table>

      <h3>問題別の結果と解説</h3>
      <ul class="result-list" id="result-list"></ul>

      <div class="quiz-actions">
        <a class="btn btn-secondary" href="/">もう一度受験する</a>
        <a class="btn" href="/dashboard.html">ダッシュボードを見る</a>
      </div>
    </section>
  </main>

  <footer>
    二等無人航空機操縦者 学科試験対策（第2章 / 第3章）
  </footer>

  <script src="/assets/js/common.js"></script>
  <script src="/assets/js/quiz.js"></script>
</body>
</html>
